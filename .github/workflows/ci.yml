name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      export_digest:
        description: Immutable worker image digest to export for control-node recovery
        required: true
        type: string

jobs:
  export-worker:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Validate requested digest
        env:
          DIGEST: ${{ inputs.export_digest }}
        run: |
          if [[ ! "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "export_digest must be an immutable sha256 digest" >&2
            exit 1
          fi

      - name: Export exact amd64 image from GHCR
        env:
          DIGEST: ${{ inputs.export_digest }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REF="ghcr.io/x4org/reposwarm-worker@$DIGEST"
          ARCHIVE="$RUNNER_TEMP/reposwarm-worker-amd64.oci.tar"
          sudo ctr -n reposwarm-export images pull \
            --platform linux/amd64 \
            --user "$GITHUB_ACTOR:$GHCR_TOKEN" \
            "$REF"
          sudo ctr -n reposwarm-export images export \
            --platform linux/amd64 \
            "$ARCHIVE" \
            "$REF"
          sudo chown "$USER:$USER" "$ARCHIVE"
          zstd -T0 -10 "$ARCHIVE" -o "$ARCHIVE.zst"

      - name: Upload short-lived recovery archive
        uses: actions/upload-artifact@v4
        with:
          name: reposwarm-worker-amd64
          path: ${{ runner.temp }}/reposwarm-worker-amd64.oci.tar.zst
          retention-days: 1
          compression-level: 0

  unit-tests:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v --tb=short

  changes:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for code changes
        id: filter
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$FILES"
          CODE_CHANGED="false"
          while IFS= read -r file; do
            case "$file" in
              *.md|LICENSE|.gitignore|docs/*) ;;
              *) CODE_CHANGED="true"; break ;;
            esac
          done <<< "$FILES"
          echo "code=$CODE_CHANGED" >> "$GITHUB_OUTPUT"

  docker:
    needs: [integration-tests, changes]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/x4org/reposwarm-worker:latest
            ghcr.io/x4org/reposwarm-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
